org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Belt-and-suspenders for the Media3 LogSessionId crash on Android <12.
# Even with the proguard rules in app/proguard-rules.pro, disabling R8's
# horizontal class merging gives extra protection — the merge pass is the
# specific R8 optimization that pulls API-31-only references into code
# reachable on older Android. See https://github.com/androidx/media/issues/2535
systemProp.com.android.tools.r8.disableHorizontalClassMerging=true
