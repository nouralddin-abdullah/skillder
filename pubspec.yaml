name: skillder
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_card_swiper: ^7.2.0
  flutter_svg: ^2.2.4
  google_fonts: ^6.2.1
  image_picker: ^1.2.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/svgs/
    - assets/images/explore/
    - assets/images/safety-widget/
    - assets/branding/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/branding/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "assets/branding/icon_background.png"
  adaptive_icon_foreground: "assets/branding/icon_foreground.png"
  web:
    generate: true
    image_path: "assets/branding/icon.png"
    background_color: "#FF6B6B"
    theme_color: "#FF6B6B"
  windows:
    generate: true
    image_path: "assets/branding/icon.png"

flutter_native_splash:
  color: "#FF6B6B"
  image: "assets/branding/icon_foreground.png"
  android_12:
    image: "assets/branding/icon_foreground.png"
    color: "#FF6B6B"
  android: true
  ios: true
  web: false
  fullscreen: true
