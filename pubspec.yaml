name: skillder
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_card_swiper: ^7.2.0
  flutter_svg: ^2.2.4
  google_fonts: ^6.2.1
  image_picker: ^1.2.1
  shared_preferences: ^2.5.5
  http: ^1.2.2
  http_parser: ^4.1.2
  google_sign_in: ^6.2.2
  uuid: ^4.5.1
  drift: ^2.21.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5
  path: ^1.9.0
  socket_io_client: ^3.1.2
  video_player: ^2.9.2
  chewie: ^1.8.5
  video_thumbnail: ^0.5.3
  pro_image_editor: ^12.4.4
  pro_video_editor: ^1.16.2

  # ── Voice/video calls ──
  livekit_client: ^2.4.4              # Core media SDK (WebRTC tracks, room state)
  firebase_core: ^3.6.0               # Required by firebase_messaging
  firebase_messaging: ^15.1.3         # FCM push receipt + background handler
  flutter_callkit_incoming: ^2.5.4    # Foreground service + full-screen activity (custom UI mode)
  permission_handler: ^11.3.1         # Mic / camera / notifications runtime permissions
  wakelock_plus: ^1.2.8               # Keep screen awake during active call
  audioplayers: ^6.1.0                # Local outgoing-call ringback tone

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3
  drift_dev: ^2.21.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/svgs/
    - assets/images/explore/
    - assets/images/safety-widget/
    - assets/images/complete-profile/
    - assets/branding/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/branding/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "assets/branding/icon_background.png"
  adaptive_icon_foreground: "assets/branding/icon_foreground.png"
  web:
    generate: true
    image_path: "assets/branding/icon.png"
    background_color: "#FF6B6B"
    theme_color: "#FF6B6B"
  windows:
    generate: true
    image_path: "assets/branding/icon.png"

flutter_native_splash:
  color: "#FF6B6B"
  image: "assets/branding/icon_foreground.png"
  android_12:
    image: "assets/branding/icon_foreground.png"
    color: "#FF6B6B"
  android: true
  ios: true
  web: false
  fullscreen: true
